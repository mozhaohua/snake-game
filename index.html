<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>贪吃蛇 - Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            padding: 10px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            background: linear-gradient(90deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #gameCanvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            max-width: 100vw;
            max-height: 70vh;
        }
        .score {
            font-size: 1.2rem;
            margin-top: 10px;
            color: #00ff88;
        }
        .instructions {
            margin-top: 10px;
            color: #888;
            font-size: 0.8rem;
            text-align: center;
        }
        button {
            margin-top: 15px;
            padding: 12px 30px;
            font-size: 1rem;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            border-radius: 25px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }
        button:active {
            transform: scale(0.95);
        }
        /* 移动端控制按钮 */
        .mobile-controls {
            display: none;
            margin-top: 15px;
            gap: 10px;
        }
        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .mobile-controls-row {
                display: flex;
                gap: 10px;
            }
            .control-btn {
                width: 60px;
                height: 60px;
                border-radius: 50%;
                background: rgba(0, 255, 136, 0.2);
                border: 2px solid #00ff88;
                color: #00ff88;
                font-size: 1.5rem;
                display: flex;
                align-items: center;
                justify-content: center;
                user-select: none;
                -webkit-user-select: none;
            }
            .control-btn:active {
                background: rgba(0, 255, 136, 0.5);
            }
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    <canvas id="gameCanvas"></canvas>
    <div class="score">得分: <span id="score">0</span></div>
    <button onclick="startGame()" id="startBtn">开始游戏</button>
    <p class="instructions">电脑：方向键 / WASD<br>手机：滑动屏幕 或 下方按钮</p>
    
    <!-- 移动端方向控制 -->
    <div class="mobile-controls">
        <div class="mobile-controls-row">
            <button class="control-btn" onclick="setDirection(0, -1)">⬆️</button>
        </div>
        <div class="mobile-controls-row">
            <button class="control-btn" onclick="setDirection(-1, 0)">⬅️</button>
            <button class="control-btn" onclick="setDirection(0, 1)">⬇️</button>
            <button class="control-btn" onclick="setDirection(1, 0)">➡️</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');

        // 自适应画布大小
        function resizeCanvas() {
            const maxSize = Math.min(window.innerWidth - 20, window.innerHeight * 0.6);
            const size = Math.floor(maxSize / 20) * 20;
            canvas.width = Math.max(300, size);
            canvas.height = Math.max(300, size);
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;

        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let gameLoop = null;
        let isRunning = false;
        let hasStarted = false;

        function initGame() {
            const tc = canvas.width / GRID_SIZE;
            snake = [
                { x: Math.floor(tc / 2), y: Math.floor(tc / 2) },
                { x: Math.floor(tc / 2), y: Math.floor(tc / 2) + 1 },
                { x: Math.floor(tc / 2), y: Math.floor(tc / 2) + 2 }
            ];
            direction = { x: 0, y: -1 };
            nextDirection = { x: 0, y: -1 };
            score = 0;
            scoreElement.textContent = score;
            placeFood();
            draw();
        }

        function startGame() {
            if (hasStarted && !isRunning) {
                initGame();
            } else if (!hasStarted) {
                initGame();
                hasStarted = true;
            }
            isRunning = true;
            startBtn.textContent = "重新开始";
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 150);
        }

        function placeFood() {
            const tc = canvas.width / GRID_SIZE;
            food = {
                x: Math.floor(Math.random() * tc),
                y: Math.floor(Math.random() * tc)
            };
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    placeFood();
                    break;
                }
            }
        }

        function update() {
            direction = { ...nextDirection };

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            const tc = canvas.width / GRID_SIZE;

            if (head.x < 0 || head.x >= tc || head.y < 0 || head.y >= tc) {
                gameOver();
                return;
            }

            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            const tc = canvas.width / GRID_SIZE;
            const gs = canvas.width / tc;
            
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            for (let i = 0; i <= tc; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gs, 0);
                ctx.lineTo(i * gs, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gs);
                ctx.lineTo(canvas.width, i * gs);
                ctx.stroke();
            }

            // 食物
            ctx.fillStyle = '#ff4757';
            ctx.shadowColor = '#ff4757';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(
                food.x * gs + gs / 2,
                food.y * gs + gs / 2,
                gs / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gs + gs / 2,
                    segment.y * gs + gs / 2,
                    0,
                    segment.x * gs + gs / 2,
                    segment.y * gs + gs / 2,
                    gs / 2
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    gradient.addColorStop(0, '#00cc6a');
                    gradient.addColorStop(1, '#009950');
                }
                
                ctx.fillStyle = gradient;
                ctx.shadowColor = '#00ff88';
                ctx.shadowBlur = index === 0 ? 15 : 5;
                ctx.fillRect(
                    segment.x * gs + 1,
                    segment.y * gs + 1,
                    gs - 2,
                    gs - 2
                );
            });
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            startBtn.textContent = "再玩一次";
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ff4757';
            ctx.font = 'bold 40px Segoe UI';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.fillStyle = '#fff';
            ctx.font = '20px Segoe UI';
            ctx.fillText(`最终得分: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
        }

        // 移动端按钮控制
        function setDirection(x, y) {
            if (!isRunning) return;
            if (direction.x !== -x && direction.y !== -y) {
                nextDirection = { x, y };
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isRunning && e.key !== 'r' && e.key !== 'R') return;
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        // 触摸滑动控制
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!isRunning) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            const minSwipe = 30;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > minSwipe && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < -minSwipe && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else {
                if (dy > minSwipe && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < -minSwipe && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
        }, { passive: false });

        initGame();
    </script>
</body>
</html>
